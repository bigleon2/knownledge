- title: Arbre de Décision — Sélection Agent/Skill
  content: "Arbre de décision pour la sélection performance-driven d'agents et de skills.\nÀ utiliser pour chaque sous-tâche\
    \ dans le cadre du protocole gen-plan.\n\nPROCESSUS DE DÉCISION :\n\nÉTAPE 1 : Existe-t-il un SKILL correspondant dans\
    \ l'écosystème ?\n├─ OUI → Charger le Skill\n│   └─ Le skill bénéficie-t-il d'un agent spécialisé en interne ?\n│    \
    \   ├─ OUI → Skill + Agent Spécialisé (PERFORMANCE OPTIMALE)\n│       │   Exemple : fullstack-dev chargé, puis délégué\
    \ à full-stack-developer\n│       └─ NON → Skill seul via general-purpose (BONNE PERFORMANCE)\n│           Exemple : web-search\
    \ utilisé via general-purpose\n└─ NON → Continuer à la sélection d'agent\n\nÉTAPE 2 : Quel agent SPÉCIALISÉ correspond\
    \ le mieux (pas de skill disponible) ?\n- Est-ce une app web Next.js avec UI interactive ?\n  └─ OUI → full-stack-developer\n\
    \  └─ NON → Est-ce un PPT/deck de slides ?\n      └─ OUI → ppt-expert\n      └─ NON → Est-ce purement visuel/styling (CSS,\
    \ responsive, animation) ?\n          └─ OUI → frontend-styling-expert\n          └─ NON → Est-ce de l'architecture/planification\
    \ uniquement (pas de sortie code) ?\n              └─ OUI → Plan\n              └─ NON → Est-ce une recherche rapide fichiers/code\
    \ ?\n                  └─ OUI → Explore\n                  └─ NON → general-purpose (DERNIER RECOURS)\n\nCLÉ : La performance\
    \ est le moteur de décision à CHAQUE branche.\n\nCHECKLIST D'ÉVALUATION PAR SOUS-TÂCHE :\n| Question | Si OUI | Si NON\
    \ |\n|---|---|---|\n| Skill correspondant existe ? | Charger → évaluer besoin agent | Passer à recherche agent |\n| Skill\
    \ + agent spécialisé > skill seul ? | Déléguer à agent spécialisé | Utiliser skill directement |\n| Agent spécialisé >\
    \ general-purpose ? | Utiliser agent spécialisé | Utiliser general-purpose |\n\nCet arbre de décision doit être appliqué\
    \ systématiquement pour chaque sous-tâche d'un plan gen-plan."
  category: protocol
  tags:
  - arbre
  - décision
  - sélection
  - agent
  - skill
  - performance
  - routage
  - workflow
  priority: critical
  source: imported
  pinned: true
  updated: '2026-06-21'
- title: Matrice de Décision Performance-Driven
  content: 'Matrice de décision pour le choix optimal agent/skill :

    - Skill + Agent spécialisé = OPTIMAL

    - Skill seul = BON

    - Agent spécialisé seul = MODÉRÉ

    - general-purpose = DERNIER RECOURS


    Cette matrice guide la sélection du meilleur agent pour chaque tâche, en privilégiant toujours la combinaison skill+agent
    spécialisé.'
